<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify Player</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="player.css">
  <script src="https://sdk.scdn.co/spotify-player.js"></script>
  <script defer src="../auth.js"></script>
  <script defer src="player.js"></script>
</head>

<body>
  <div class="container">
    <header>
      <h1>Spotify Player</h1>
      <button id="logoutBtn" class="btn-logout">Logout</button>
    </header>

    <!-- GLOBAL SEARCH BAR -->
    <section class="search">
      <input type="text" id="searchInput" placeholder="Search for tracks...">
      <button id="searchBtn" class="btn-search">Search</button>
      <div id="loader" class="loader" hidden></div>
    </section>

    <!-- GLOBAL SEARCH RESULTS -->
    <ul id="searchResults"></ul>

    <!-- TRACK & SELECTED PLAYLIST GRID -->
    <section class="player-grid">
      <!-- Current Track -->
      <div class="current-track">
        <!-- Track info: title, device status, album cover -->
        <div class="track-info">
          <h2 id="trackName">No song playing</h2>
          <p id="trackArtist"></p>
          <img id="trackImage" src="" alt="Album Art">
        </div>

        <!-- Progress Bar -->
        <div class="progress-area">
          <span id="currentTime">0:00</span>
          <input type="range" id="progressBar" min="0" max="100" value="0">
          <span id="totalDuration">0:00</span>
        </div>

        <!-- Navigation controls -->
        <div class="controls">
          <button id="likeBtn" class="control-btn"><i class="far fa-heart"></i></button>
          <div class="controls-group-center">
            <button id="prevBtn" class="control-btn"><i class="fas fa-backward"></i></button>
            <button id="playPauseBtn" class="control-btn"><i class="fas fa-play"></i></button>
            <button id="nextBtn" class="control-btn"><i class="fas fa-forward"></i></button>
          </div>
          <button id="shuffleBtn" class="control-btn"><i class="fas fa-random"></i></button>
        </div>
      </div>

      <!-- Selected Playlist -->
      <div class="selected-playlist">
        <div class="playlist-title-bar">
          <h2 id="selectedPlaylistName" class="truncate-text" title="Liked Songs">Liked Songs</h2>
          <input type="text" id="playlistSearchInput" class="playlist-search-selected" placeholder="Search...">
        </div>
        <ul id="selectedPlaylistTracks"></ul>
      </div>
    </section>

    <!-- Playlist List -->
    <section class="playlists">
      <h2>Your Playlists</h2>
      <ul id="playlistList"></ul>
    </section>

  </div>
</body>

</html>
